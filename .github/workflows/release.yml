name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Verify source
        run: |
          dotnet test tests/Deathmatch.Tests/Deathmatch.Tests.csproj -c Release --nologo
      - name: Build release assets
        run: scripts/package-release.sh "${GITHUB_REF_NAME}"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            artifacts/*.zip \
            artifacts/*.zip.sha256 \
            artifacts/plugin-manifest.json \
            --verify-tag \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
